#mts-ssl.conf

<VirtualHost *:443>
        ServerAdmin chris@manchestertechservices.co.uk
        DocumentRoot /var/www/mts-ssl
        ServerName manchestertechservices.co.uk
        ServerAlias www.manchestertechservices.co.uk
        
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
        SSLEngine on
        
        SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
        SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
        #SSLCertificateChainFile /etc/apache2/ssl.crt/server-ca.crt
        
        Protocols h2 http/1.1
        
        # modern configuration, tweak to your needs
        SSLProtocol             all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1 -TLSv1.2
        SSLHonorCipherOrder     off
        SSLSessionTickets       off
        
        Header set Content-Security-Policy "default-src 'self' data:; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.wp.com https://secure.gravatar.com/js/gprofiles.js; style-src 'self' 'unsafe-inline' https://0.gravatar.com https://*.wp.com; form-action 'self'; upgrade-insecure-requests; object-src 'none'; base-uri 'self'; connect-src 'self'; font-src 'self' https://*.wp.com data:; frame-ancestors 'self'; frame-src 'self' https://*.wp.com https://wordpress.com; img-src 'self' data: https://*.wp.com https://en.wordpress.com https://*.gravatar.com; manifest-src 'self'; media-src 'self' data:; worker-src 'self'; report-uri https://chris18890.report-uri.com/r/d/csp/enforce;"
        
        # Force Secure + HttpOnly + SameSite=Lax on PHP session cookies
        Header edit Set-Cookie ^(PHPSESSID=.*)$ "$1; Secure; HttpOnly; SameSite=Lax"
        
        # Force Secure + HttpOnly + SameSite=Lax on WordPress auth cookies
        Header edit Set-Cookie ^(wordpress_logged_in_.*)$ "$1; Secure; HttpOnly; SameSite=Lax"
        Header edit Set-Cookie ^(wordpress_sec_.*)$ "$1; Secure; HttpOnly; SameSite=Lax"
        
        # Example: SSO state cookie explicitly set with SameSite=None; Secure
        # (Better to set this directly in the app, but you can enforce via header if needed)
        Header edit Set-Cookie ^(sso_state=.*)$ "$1; Secure; HttpOnly; SameSite=None"
        
        <FilesMatch "\.(cgi|shtml|phtml|php)$">
                SSLOptions +StdEnvVars
        </FilesMatch>
        <Directory /usr/lib/cgi-bin>
                SSLOptions +StdEnvVars
        </Directory>
        <Directory /var/www/mts-ssl>
            Options -Indexes +FollowSymLinks +MultiViews
            AllowOverride All
            Order allow,deny
            allow from all
            RewriteEngine On
            RewriteBase /
            RewriteCond %{HTTP_HOST} ^www\.(.*)$ [NC]
            RewriteRule ^(.*)$ https://%1/$1 [R=301,L]
        </Directory>
</VirtualHost>
